<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnkiPress — Anki 덱을 A4 PDF로</title>
<meta name="description" content="Anki .apkg 파일을 브라우저에서 2단 A4 PDF로 변환. 서버 업로드 없이 100% 브라우저에서 동작합니다.">

<!-- Google Fonts: Korean-friendly typography -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">

<!-- App styles -->
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/print.css">

<!-- Favicon: simple inline SVG -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23B5838D'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-family='sans-serif' font-size='18' font-weight='700' fill='white'%3EA%3C/text%3E%3C/svg%3E">

<!-- External libs via CDN -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fzstd@0.1.1/umd/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.js"></script>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="app__header">
    <div class="brand">
      <div class="brand__mark">A</div>
      <span class="brand__text">AnkiPress</span>
    </div>
    <h1 class="app__title">Anki 덱을 A4 PDF로</h1>
    <p class="app__subtitle">.apkg 파일을 올리면 2단 A4 PDF로 변환해드려요.</p>
  </header>

  <!-- Step 1: Upload -->
  <section class="step" id="step-load">
    <div class="step__head">
      <div class="step__number">1</div>
      <div>
        <h2 class="step__title">파일 선택</h2>
      </div>
    </div>

    <label
      class="drop-zone"
      id="dropZone"
      for="fileInput"
      tabindex="0"
      aria-label=".apkg 파일 업로드"
    >
      <div class="drop-zone__icon" aria-hidden="true">⬆</div>
      <div class="drop-zone__label" id="fileLabel">.apkg 파일을 끌어다 놓거나 클릭해서 선택</div>
    </label>
    <input type="file" id="fileInput" accept=".apkg" hidden>

    <div class="stat-grid">
      <div class="stat">
        <div class="stat__label">카드 수</div>
        <div class="stat__value" id="cardCount">0</div>
      </div>
      <div class="stat">
        <div class="stat__label">덱 수</div>
        <div class="stat__value" id="deckCount">0</div>
      </div>
    </div>
  </section>

  <!-- Step 2: Configure -->
  <section class="step is-hidden" id="step-config">
    <div class="step__head">
      <div class="step__number">2</div>
      <div>
        <h2 class="step__title">내보내기 설정</h2>
      </div>
    </div>

    <!-- Field selector -->
    <div class="section">
      <h3 class="section__title">필드 선택</h3>
      <div id="fieldGroups"></div>
    </div>

    <!-- Theme grid -->
    <div class="section">
      <h3 class="section__title">테마</h3>
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <!-- Typography -->
    <div class="section">
      <h3 class="section__title">글꼴 및 레이아웃</h3>

      <div class="form-row">
        <label class="form-row__label" for="fontFamily">글꼴</label>
        <select id="fontFamily"></select>
      </div>

      <div class="form-row">
        <label class="form-row__label" for="fontSize">글자 크기</label>
        <div class="slider-row">
          <input type="range" id="fontSize" min="7" max="14" step="1" value="9">
          <span class="slider-row__value" id="fontSizeValue">9pt</span>
        </div>
      </div>

      <div class="form-row">
        <span class="form-row__label">덱 제목 표시</span>
        <label class="switch">
          <input type="checkbox" id="deckTitleToggle" checked>
          <span class="switch__track"></span>
        </label>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-bar">
      <button type="button" class="btn btn--primary" id="printBtn">
        <span class="btn__icon">⬇</span>
        PDF로 저장
      </button>
      <button type="button" class="btn btn--ghost" id="previewBtn">
        미리보기 새로고침
      </button>
      <button type="button" class="btn btn--quiet" id="resetBtn">
        다시 시작
      </button>
    </div>

    <!-- Preview -->
    <div class="preview-wrap">
      <div class="preview-wrap__title">
        <h3>미리보기</h3>
      </div>
      <div id="preview"></div>
    </div>

  </section>

  <footer class="app__footer">
    <p>AnkiPress</p>
  </footer>

</div>

<!-- Print-only target: populated on demand, hidden in screen mode -->
<div id="print-target" aria-hidden="true"></div>

<!-- Toast + loading -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="loading" id="loadingOverlay" aria-hidden="true">
  <div class="loading__card">
    <div class="loading__spinner"></div>
    <div class="loading__text" id="loadingText">처리 중...</div>
  </div>
</div>

<!-- Entry -->
<script type="module" src="js/app.js"></script>

</body>
</html>
